# ============================================================
# Elpriset Just Nu — full Lovelace view example
# Requires only: custom:button-card (HACS)
# No other custom cards needed.
# ============================================================

views:
  - title: Elpriset
    path: elpriset
    icon: mdi:lightning-bolt
    cards:
      - type: vertical-stack
        cards:

          - type: heading
            icon: mdi:transmission-tower
            heading_style: title
            heading: Electricity Price – SE3

          # ── Current / next hour / tomorrow ───────────────────
          - type: horizontal-stack
            cards:
              - type: custom:button-card
                entity: sensor.stockholm_se3_sodra_mellansverige_current_total_price
                icon: mdi:lightning-bolt
                name: Now
                show_name: true
                show_state: false
                show_label: true
                label: |
                  [[[
                    var val = parseFloat(entity.state);
                    if (isNaN(val)) return '–';
                    return val.toFixed(1) + ' öre/kWh';
                  ]]]
                size: 40%
                tap_action:
                  action: more-info
                styles:
                  card:
                    - height: 110px
                    - border-radius: 16px
                    - background-color: |
                        [[[
                          var val = parseFloat(entity.state);
                          if (isNaN(val)) return '#1c1c1c';
                          if (val > 200) return '#b71c1c';
                          if (val > 100) return '#e65100';
                          if (val > 50)  return '#f9a825';
                          return '#1b5e20';
                        ]]]
                  icon:
                    - color: white
                  name:
                    - color: white
                    - font-size: 14px
                    - font-weight: bold
                    - justify-self: center
                  label:
                    - color: white
                    - font-size: 13px
                    - font-weight: bold
                    - justify-self: center
                    - align-self: end
                    - padding-bottom: 8px

              - type: custom:button-card
                entity: sensor.stockholm_se3_sodra_mellansverige_next_hour_total_price
                icon: mdi:lightning-bolt-outline
                name: Next Hour
                show_name: true
                show_state: false
                show_label: true
                label: |
                  [[[
                    var val = parseFloat(entity.state);
                    if (isNaN(val)) return '–';
                    return val.toFixed(1) + ' öre/kWh';
                  ]]]
                size: 40%
                tap_action:
                  action: more-info
                styles:
                  card:
                    - height: 110px
                    - border-radius: 16px
                    - background-color: |
                        [[[
                          var val = parseFloat(entity.state);
                          if (isNaN(val)) return '#1c1c1c';
                          if (val > 200) return '#b71c1c';
                          if (val > 100) return '#e65100';
                          if (val > 50)  return '#f9a825';
                          return '#1b5e20';
                        ]]]
                  icon:
                    - color: white
                  name:
                    - color: white
                    - font-size: 14px
                    - font-weight: bold
                    - justify-self: center
                  label:
                    - color: white
                    - font-size: 13px
                    - font-weight: bold
                    - justify-self: center
                    - align-self: end
                    - padding-bottom: 8px

              - type: custom:button-card
                entity: sensor.stockholm_se3_sodra_mellansverige_tomorrow_prices_available
                icon: mdi:calendar-check
                name: Tomorrow
                show_name: true
                show_state: false
                show_label: true
                label: |
                  [[[
                    return entity.state === 'Yes' ? 'Prices ready' : 'After ~13:00';
                  ]]]
                size: 40%
                tap_action:
                  action: more-info
                styles:
                  card:
                    - height: 110px
                    - border-radius: 16px
                    - background-color: |
                        [[[
                          return entity.state === 'Yes' ? '#1b5e20' : '#1c1c1c';
                        ]]]
                  icon:
                    - color: white
                  name:
                    - color: white
                    - font-size: 14px
                    - font-weight: bold
                    - justify-self: center
                  label:
                    - color: white
                    - font-size: 13px
                    - font-weight: bold
                    - justify-self: center
                    - align-self: end
                    - padding-bottom: 8px

          # ── Min / avg / max ───────────────────────────────────
          - type: horizontal-stack
            cards:
              - type: custom:button-card
                entity: sensor.stockholm_se3_sodra_mellansverige_min_total_price_today
                icon: mdi:arrow-down-bold
                name: Min today
                show_name: true
                show_state: false
                show_label: true
                label: |
                  [[[
                    var val = parseFloat(entity.state);
                    return isNaN(val) ? '–' : val.toFixed(1) + ' öre';
                  ]]]
                size: 40%
                styles:
                  card:
                    - height: 90px
                    - border-radius: 16px
                    - background-color: "#1b5e20"
                  icon:
                    - color: white
                  name:
                    - color: white
                    - font-size: 12px
                    - font-weight: bold
                    - justify-self: center
                  label:
                    - color: white
                    - font-size: 13px
                    - font-weight: bold
                    - justify-self: center
                    - align-self: end
                    - padding-bottom: 8px

              - type: custom:button-card
                entity: sensor.stockholm_se3_sodra_mellansverige_average_total_price_today
                icon: mdi:approximately-equal
                name: Avg today
                show_name: true
                show_state: false
                show_label: true
                label: |
                  [[[
                    var val = parseFloat(entity.state);
                    return isNaN(val) ? '–' : val.toFixed(1) + ' öre';
                  ]]]
                size: 40%
                styles:
                  card:
                    - height: 90px
                    - border-radius: 16px
                    - background-color: "#1c3a5e"
                  icon:
                    - color: white
                  name:
                    - color: white
                    - font-size: 12px
                    - font-weight: bold
                    - justify-self: center
                  label:
                    - color: white
                    - font-size: 13px
                    - font-weight: bold
                    - justify-self: center
                    - align-self: end
                    - padding-bottom: 8px

              - type: custom:button-card
                entity: sensor.stockholm_se3_sodra_mellansverige_max_total_price_today
                icon: mdi:arrow-up-bold
                name: Max today
                show_name: true
                show_state: false
                show_label: true
                label: |
                  [[[
                    var val = parseFloat(entity.state);
                    return isNaN(val) ? '–' : val.toFixed(1) + ' öre';
                  ]]]
                size: 40%
                styles:
                  card:
                    - height: 90px
                    - border-radius: 16px
                    - background-color: "#b71c1c"
                  icon:
                    - color: white
                  name:
                    - color: white
                    - font-size: 12px
                    - font-weight: bold
                    - justify-self: center
                  label:
                    - color: white
                    - font-size: 13px
                    - font-weight: bold
                    - justify-self: center
                    - align-self: end
                    - padding-bottom: 8px

          # ── Price history graph (last 24 h) ───────────────────
          - type: history-graph
            title: Total Price – Last 24h (öre/kWh)
            hours_to_show: 24
            logarithmic_scale: false
            entities:
              - entity: sensor.stockholm_se3_sodra_mellansverige_current_total_price
                name: Total price

          # ── Spot price history for comparison ────────────────
          - type: history-graph
            title: Spot Price – Last 24h (SEK/kWh)
            hours_to_show: 24
            entities:
              - entity: sensor.stockholm_se3_sodra_mellansverige_current_spot_price
                name: Spot price

          # ── Detail entities ───────────────────────────────────
          - type: entities
            title: Details
            entities:
              - entity: sensor.stockholm_se3_sodra_mellansverige_current_spot_price
                name: Spot price now (ex. moms)
                icon: mdi:transmission-tower
              - entity: sensor.stockholm_se3_sodra_mellansverige_current_total_price
                name: Total price now (incl. moms)
                icon: mdi:cash-clock
              - entity: sensor.stockholm_se3_sodra_mellansverige_next_hour_total_price
                name: Total price next hour
                icon: mdi:cash-fast
              - entity: sensor.stockholm_se3_sodra_mellansverige_average_total_price_today
                name: Average today
                icon: mdi:approximately-equal
              - entity: sensor.stockholm_se3_sodra_mellansverige_min_total_price_today
                name: Minimum today
                icon: mdi:arrow-down-bold
              - entity: sensor.stockholm_se3_sodra_mellansverige_max_total_price_today
                name: Maximum today
                icon: mdi:arrow-up-bold
              - entity: sensor.stockholm_se3_sodra_mellansverige_tomorrow_prices_available
                name: Tomorrow prices available
                icon: mdi:calendar-check
